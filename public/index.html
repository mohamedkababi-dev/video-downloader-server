<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Video Downloader</title>
<style>
body {
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 50px;
}
input {
  width: 80%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}
button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}
.mp3 {
  background: blue;
  color: white;
}
.video {
  background: green;
  color: white;
}
</style>
</head>
<body>

<h1>🎬 Video Downloader</h1>

<input type="text" id="url" placeholder="ضع رابط الفيديو هنا">

<br>

<button class="video" onclick="downloadVideo()">تحميل فيديو</button>
<button class="mp3" onclick="downloadMP3()">تحميل MP3</button>

<script>
function downloadMP3() {
  const url = document.getElementById('url').value;
  window.location.href = `/mp3?url=${url}`;
}

function downloadVideo() {
  const url = document.getElementById('url').value;
  window.location.href = `/video?url=${url}`;
}
</script>

</body>
</html>
